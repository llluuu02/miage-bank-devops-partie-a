# =============================================================================
#  argocd/application.yaml — Application ArgoCD pour MIAGE-Bank
# -----------------------------------------------------------------------------
#  Déploie le chart Helm miage-bank/ depuis le dépôt Git, branche main, en
#  synchronisation automatique (prune + selfHeal)
#
#  Prérequis non gérés par cette Application :
#    - CRD External Secrets Operator déjà installées
#    - Vault déployé et peuplé
#    - MySQL / MongoDB
#
#  Commande pour déployer ArgoCD : kubectl apply -f argocd/application.yaml
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: miage-bank
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/llluuu02/miage-bank-devops-partie-a.git
    targetRevision: main
    path: miage-bank
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: miage-bank

  # Paramètres de synchronisation
  syncPolicy:
    automated:
      prune: true             # suppression des ressources retirées du Git
      selfHeal: true          # re-déploiement si dérive manuelle détectée
    syncOptions:
      - CreateNamespace=true  # création namespace
