{{- /*
  secretstore.yaml - connexion d'External Secrets Operator (ESO) à Vault.
  API external-secrets.io/v1.
*/}}

# 1) Secret contenant le token d'accès à Vault.
# "root" car Vault tourne en mode dev ; en prod on utiliserait une
# auth Kubernetes ou AppRole plutôt qu'un token statique.
apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: {{ .Values.global.namespace }}
stringData:
  token: "root"
---
# 2) SecretStore : indique à ESO où se trouve Vault et comment s'y authentifier.
# c'est cet objet que référencent les ExternalSecret.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: {{ .Values.global.namespace }}
spec:
  provider:
    vault:
      # adresse de Vault (service "vault" dans le namespace default)
      server: "http://vault.default.svc.cluster.local:8200"
      path: "secret"        # moteur KV monté sur "secret"
      version: "v2"         # KV version 2
      auth:
        # authentification par token, lu dans le Secret vault-token ci-dessus
        tokenSecretRef:
          name: vault-token
          key: token