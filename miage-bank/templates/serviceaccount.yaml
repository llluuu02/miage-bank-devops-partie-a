{{- /*
  serviceaccount.yaml - un ServiceAccount dédié par micro-service (RBAC).
  Principe de moindre privilège : chaque service a son propre compte.
*/}}

{{- /* Une itération par service */}}
{{- range $name, $config := .Values.microservices }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  # compte propre au service
  name: {{ $name }}-sa
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $name }}
# aucun des services n'appelle l'API Kubernetes : on n'injecte pas le token d'API dans le pod
automountServiceAccountToken: false
{{- end }}
