{{- /*
  externalsecrets.yaml - un ExternalSecret par service ayant une base de données.
  ESO lit les identifiants dans Vault et génère un Secret Kubernetes natif.
*/}}

{{- /* boucle sur les services, mais on ne génère un ExternalSecret que pour
       ceux marqués secret: true (clientservice, compteservice). */}}
{{- range $name, $config := .Values.microservices }}
{{- if $config.secret }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $name }}-db-credentials
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $name }}
spec:
  # ESO resynchronise depuis Vault toutes les heures
  refreshInterval: "1h"
  # référence au SecretStore qui sait se connecter à Vault
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    # secret Kubernetes natif généré par ESO ; "Owner" = ESO le crée et le possède
    name: {{ $name }}-secret
    creationPolicy: Owner
  data:
    # mot de passe : lu dans Vault à secret/miage-bank/<service>, propriété "password"
    - secretKey: DB_PASSWORD
      remoteRef:
        key: secret/miage-bank/{{ $name }}
        property: password
    # nom d'utilisateur : même chemin Vault, propriété "username"
    - secretKey: DB_USER
      remoteRef:
        key: secret/miage-bank/{{ $name }}
        property: username
{{- end }}
{{- end }}