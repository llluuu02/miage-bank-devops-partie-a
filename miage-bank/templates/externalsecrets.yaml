{{- range $name, $config := .Values.microservices }}
{{- if $config.secret }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $name }}-db-credentials
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $name }}
spec:
  refreshInterval: "1h"
  # Référence au SecretStore qui gère la connexion à Vault
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    # Secret Kubernetes natif généré dynamiquement par ESO
    name: {{ $name }}-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        # KV v2 : avec un SecretStore version "v2", ESO gère déjà le segment
        # /data/ — vérifie selon ta version si le chemin doit être
        # "secret/miage-bank/<name>" plutôt que "secret/data/miage-bank/<name>".
        key: secret/miage-bank/{{ $name }}
        property: password
    - secretKey: DB_USER
      remoteRef:
        key: secret/miage-bank/{{ $name }}
        property: username
{{- end }}
{{- end }}