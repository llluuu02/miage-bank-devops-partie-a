{{- /*
  ingress.yaml - point d'entrée HTTP unique (Traefik).
  Deux routes : /api -> apigateway, / -> frontend.
*/}}

{{- /* Ingress généré seulement si activé dans values.yaml */}}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: miage-bank-ingress
  namespace: {{ .Values.global.namespace }}
spec:
  # classe d'Ingress via le champ standard. Vaut "traefik" d'après values.yaml.
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    # hostname paramétrable (global.domain), ici : miage-bank.local
    - host: {{ .Values.global.domain }}
      http:
        paths:
          # Route 1 : /api -> API Gateway. La gateway matche déjà /api/clients,
          # /api/comptes, /api/clientscomptes : on transmet le préfixe tel quel
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: apigateway
                port:
                  number: 10000
          # Route 2 : / -> Frontend (SPA Angular servie par nginx).
          # déclaré après /api pour ne pas intercepter les appels API.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
{{- end }}