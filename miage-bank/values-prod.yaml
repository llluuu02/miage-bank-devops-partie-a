# =============================================================================
#  values-prod.yaml — Surcharges PRODUCTION pour MIAGE-Bank
# -----------------------------------------------------------------------------
#  Usage :
#     helm install miage-bank ./miage-bank \
#       -n miage-bank --create-namespace \
#       -f miage-bank/values.yaml -f miage-bank/values-prod.yaml
#
#  Seules les clés qui CHANGENT par rapport à values.yaml sont redéfinies ;
#  Helm fusionne en profondeur (deep-merge) les deux fichiers.
# =============================================================================

global:
  # Domaine public réel exposé via l'Ingress Traefik en prod.
  domain: bank.miage-prod.fr

# En prod, on monte les répliques des services exposés / critiques pour la
# disponibilité. Les composants "singleton" (annuaire Eureka, config server)
# restent à 1 réplique : les passer à N nécessiterait un mode HA dédié
# (peer-awareness Eureka), hors périmètre de ce TP.
microservices:
  apigateway:
    replicas: 3
    resources:
      requests: { memory: "512Mi", cpu: "250m" }
      limits:   { memory: "1Gi",   cpu: "1000m" }

  clientservice:
    replicas: 2
    resources:
      requests: { memory: "512Mi", cpu: "250m" }
      limits:   { memory: "1Gi",   cpu: "1000m" }

  compteservice:
    replicas: 2
    resources:
      requests: { memory: "512Mi", cpu: "250m" }
      limits:   { memory: "1Gi",   cpu: "1000m" }

  compositeservice:
    replicas: 2
    resources:
      requests: { memory: "512Mi", cpu: "250m" }
      limits:   { memory: "1Gi",   cpu: "1000m" }